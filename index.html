<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026 - Agro Forte & Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <span class="badge-tema">Agrinho 2026</span>
            <h1>Agro Forte, Futuro Sustentável</h1>
            <p>exemplo de um site</p>
        </div>
    </header>

    <main class="container main-content">
        
        <section class="intro-card">
            <h2>subtítulo</h2>
            <p> Texto de apresentação</p>
        </section>

        <div class="dashboard-grid">
            
            <section class="card form-section">
                <h3><span class="icon">🌱</span> Dados do usuário</h3>
                <form id="sustainable-form">
                    <div class="form-group">
                        <label for="area-cultivo">valor n 01</label>
                        <input type="number" id="area-cultivo" min="1" placeholder="Ex: 50" required>
                    </div>

                    <div class="form-group">
                        <label for="manejo-solo"> programação para opções</label>
                        <select id="manejo-solo" required>
                            <option value="" disabled selected>Selecione uma opção...</option>
                            <option value="direto">opção 01</option>
                            <option value="convencional">opção 02</option>
                            <option value="organico">opção 03</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="uso-agua">segunda pergunta</label>
                        <select id="uso-agua" required>
                            <option value="" disabled selected>Selecione uma opção...</option>
                            <option value="gotejamento">opção 01</option>
                            <option value="aspersao">opção 02</option>
                            <option value="excesso">opção 03</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-submit">Analisar Equilíbrio Ecológico</button>
                </form>
            </section>

            <section class="card result-section" id="result-panel">
                <h3><span class="icon">🌴</span> resultado</h3>
                
                <div class="placeholder-text" id="placeholder-msg">
                    Preencha os dados ao lado.
                </div>

                <div class="results-display hidden" id="results-content">
                    <div class="score-container">
                        <span class="score-label">apresentar dados</span>
                        <div class="score-badge" id="score-value">0%</div>
                    </div>

                    <div class="status-box" id="status-box">
                        <h4 id="status-title">Aguardando Análise</h4>
                        <p id="status-desc">O resultado será exibido aqui.</p>
                    </div>

                    <div class="recommendations">
                        <h4>Diretrizes de Otimização:</h4>
                        <ul id="recommendations-list">
                            </ul>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>Concurso Agrinho 2026 .</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
